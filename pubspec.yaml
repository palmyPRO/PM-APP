name: pm_app
description: Firework Inventory Management App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  firebase_core: ^3.15.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.11
  cached_network_image: ^3.3.1
  provider: ^6.1.2
  mobile_scanner: ^7.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/Asset 160.png
    - assets/images/Asset 100.jpg


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Asset 100.jpg"

